<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET Counselling Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Theme initialization (prevents flash)
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    /* Custom scrollbar - Light */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }
    /* Custom scrollbar - Dark */
    .dark ::-webkit-scrollbar-thumb {
      background: #4b5563;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }

    /* Typing animation */
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #6366f1;
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }

    /* Message fade in */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message-enter {
      animation: fadeInUp 0.3s ease-out;
    }

    /* Markdown styling - Light */
    .prose-chat h1, .prose-chat h2, .prose-chat h3 {
      font-weight: 600;
      margin-top: 1em;
      margin-bottom: 0.5em;
    }
    .prose-chat h3 { font-size: 1rem; }
    .prose-chat ul, .prose-chat ol {
      margin: 0.5em 0;
      padding-left: 1.5em;
    }
    .prose-chat li { margin: 0.25em 0; }
    .prose-chat p { margin: 0.5em 0; }
    .prose-chat p:first-child { margin-top: 0; }
    .prose-chat p:last-child { margin-bottom: 0; }
    .prose-chat strong { font-weight: 600; }
    .prose-chat table {
      border-collapse: collapse;
      margin: 0.75em 0;
      font-size: 0.875rem;
      width: 100%;
    }
    .prose-chat th, .prose-chat td {
      border: 1px solid #e5e7eb;
      padding: 0.5em 0.75em;
      text-align: left;
    }
    .prose-chat th {
      background: #f9fafb;
      font-weight: 600;
    }
    .prose-chat code {
      background: #f3f4f6;
      padding: 0.125em 0.25em;
      border-radius: 0.25em;
      font-size: 0.875em;
    }

    /* Markdown styling - Dark */
    .dark .prose-chat th, .dark .prose-chat td {
      border-color: #374151;
    }
    .dark .prose-chat th {
      background: #1f2937;
    }
    .dark .prose-chat code {
      background: #374151;
    }

    /* Input focus glow */
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .dark .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    /* Button hover effect */
    .btn-send {
      transition: all 0.2s ease;
    }
    .btn-send:hover:not(:disabled) {
      transform: scale(1.02);
    }
    .btn-send:active:not(:disabled) {
      transform: scale(0.98);
    }

    /* Suggestion chips */
    .suggestion-chip {
      transition: all 0.2s ease;
    }
    .suggestion-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .dark .suggestion-chip:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Loading dots */
    @keyframes loadingDot {
      0%, 20% { opacity: 0.3; }
      50% { opacity: 1; }
      80%, 100% { opacity: 0.3; }
    }
    .loading-dot {
      animation: loadingDot 1.4s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Theme toggle animation */
    .theme-toggle {
      transition: transform 0.3s ease;
    }
    .theme-toggle:hover {
      transform: rotate(15deg);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">
  
  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50 transition-colors duration-200">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-semibold text-gray-900 dark:text-white">NEET Counselling Assistant</h1>
          <p class="text-xs text-gray-500 dark:text-gray-400">Powered by 2025 cutoff data</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <!-- Theme Toggle -->
        <button
          type="button"
          id="themeToggle"
          class="theme-toggle p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
          title="Toggle theme"
        >
          <!-- Sun icon (shown in dark mode) -->
          <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <!-- New Chat Button -->
        <button
          type="button"
          id="clearChatBtn"
          class="text-sm px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition flex items-center gap-1.5"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          New chat
        </button>
      </div>
    </div>
  </header>

  <!-- Chat Area -->
  <main class="flex-1 overflow-hidden flex flex-col">
    <div id="chatThread" class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 py-6 space-y-6">
        <!-- Messages will be inserted here -->
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="flex-1 flex flex-col items-center justify-center px-4 py-8">
      <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-500/20">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
      </div>
      <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">Welcome to NEET Counselling</h2>
      <p class="text-gray-500 dark:text-gray-400 text-center max-w-md mb-8">I can help you find the best medical colleges based on your NEET score, rank, and preferences.</p>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-lg">
        <button class="starter-prompt p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-left hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 transition group">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/50 rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-indigo-200 dark:group-hover:bg-indigo-800 transition">
              <svg class="w-4 h-4 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-900 dark:text-white">Predict my colleges</p>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Based on score & category</p>
            </div>
          </div>
        </button>
        
        <button class="starter-prompt p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-left hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 transition group" data-prompt="Show government colleges in MCC/All India">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-green-100 dark:bg-green-900/50 rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-green-200 dark:group-hover:bg-green-800 transition">
              <svg class="w-4 h-4 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-900 dark:text-white">MCC/All India options</p>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Central counselling seats</p>
            </div>
          </div>
        </button>
        
        <button class="starter-prompt p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-left hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 transition group" data-prompt="Compare government vs private colleges for me">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-amber-100 dark:bg-amber-900/50 rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-amber-200 dark:group-hover:bg-amber-800 transition">
              <svg class="w-4 h-4 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-900 dark:text-white">Compare options</p>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Govt vs Private analysis</p>
            </div>
          </div>
        </button>
        
        <button class="starter-prompt p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-left hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 transition group" data-prompt="What are the best BDS colleges I can get?">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-purple-100 dark:bg-purple-900/50 rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-purple-200 dark:group-hover:bg-purple-800 transition">
              <svg class="w-4 h-4 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-900 dark:text-white">BDS options</p>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Dental college choices</p>
            </div>
          </div>
        </button>
      </div>
    </div>
  </main>

  <!-- Input Area -->
  <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 sticky bottom-0 transition-colors duration-200">
    <div class="max-w-3xl mx-auto px-4 py-4">
      <!-- Input Box -->
      <div class="relative flex items-end gap-3">
        <div class="flex-1 relative">
          <textarea
            id="question"
            rows="1"
            placeholder="Ask about colleges, cutoffs, or counselling..."
            class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-2xl px-4 py-3 pr-12 focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 input-glow resize-none text-sm leading-relaxed max-h-40 overflow-y-auto text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 transition-colors duration-200"
            style="min-height: 48px;"
          ></textarea>
        </div>
        <button
          id="askBtn"
          class="btn-send bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:cursor-not-allowed text-white p-3 rounded-xl transition flex-shrink-0"
        >
          <svg id="sendIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          <div id="sendingSpinner" class="hidden">
            <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </div>
        </button>
      </div>
      <p class="text-xs text-gray-400 dark:text-gray-500 text-center mt-2">Based on 2025 NEET counselling data. Press Enter to send, Shift+Enter for new line.</p>
    </div>
  </footer>

  <script>
    // Configure marked for safe rendering
    marked.setOptions({
      breaks: true,
      gfm: true,
      sanitize: false
    });

    const questionEl = document.getElementById("question");
    const askBtn = document.getElementById("askBtn");
    const sendIcon = document.getElementById("sendIcon");
    const sendingSpinner = document.getElementById("sendingSpinner");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const chatThreadEl = document.getElementById("chatThread");
    const emptyStateEl = document.getElementById("emptyState");
    const starterPrompts = document.querySelectorAll(".starter-prompt");
    const themeToggle = document.getElementById("themeToggle");

    let currentMessages = [];
    let isStreaming = false;

    // Theme toggle functionality
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      
      if (isDark) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    themeToggle.addEventListener('click', toggleTheme);

    // Auto-resize textarea
    questionEl.addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 160) + "px";
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(text) {
      try {
        return marked.parse(text);
      } catch (e) {
        return escapeHtml(text).replace(/\n/g, "<br>");
      }
    }

    function createMessageElement(role, content, isStreaming = false) {
      const isUser = role === "user";
      
      const wrapper = document.createElement("div");
      wrapper.className = `flex gap-4 message-enter ${isUser ? "justify-end" : ""}`;
      
      if (!isUser) {
        // Assistant avatar
        const avatar = document.createElement("div");
        avatar.className = "w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center flex-shrink-0";
        avatar.innerHTML = `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>`;
        wrapper.appendChild(avatar);
      }
      
      const bubble = document.createElement("div");
      bubble.className = isUser 
        ? "max-w-[85%] bg-indigo-600 text-white rounded-2xl rounded-br-md px-4 py-3 text-sm"
        : "max-w-[85%] prose-chat text-gray-800 dark:text-gray-200 text-sm leading-relaxed";
      
      const contentEl = document.createElement("div");
      contentEl.className = "message-content";
      
      if (isUser) {
        contentEl.innerHTML = escapeHtml(content).replace(/\n/g, "<br>");
      } else {
        contentEl.innerHTML = renderMarkdown(content);
        if (isStreaming) {
          contentEl.innerHTML += '<span class="typing-cursor"></span>';
        }
      }
      
      bubble.appendChild(contentEl);
      wrapper.appendChild(bubble);
      
      if (isUser) {
        // User avatar
        const avatar = document.createElement("div");
        avatar.className = "w-8 h-8 bg-gray-200 dark:bg-gray-600 rounded-lg flex items-center justify-center flex-shrink-0";
        avatar.innerHTML = `<svg class="w-4 h-4 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>`;
        wrapper.appendChild(avatar);
      }
      
      return wrapper;
    }

    function renderChat(messages) {
      const container = chatThreadEl.querySelector(".max-w-3xl");
      container.innerHTML = "";

      if (!messages.length) {
        chatThreadEl.classList.add("hidden");
        emptyStateEl.classList.remove("hidden");
        return;
      }

      chatThreadEl.classList.remove("hidden");
      emptyStateEl.classList.add("hidden");

      messages.forEach((m) => {
        const msgEl = createMessageElement(m.role, m.content);
        container.appendChild(msgEl);
      });

      chatThreadEl.scrollTop = chatThreadEl.scrollHeight;
    }

    function addLoadingIndicator() {
      const container = chatThreadEl.querySelector(".max-w-3xl");
      
      const wrapper = document.createElement("div");
      wrapper.id = "loadingIndicator";
      wrapper.className = "flex gap-4 message-enter";
      
      const avatar = document.createElement("div");
      avatar.className = "w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center flex-shrink-0";
      avatar.innerHTML = `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>`;
      
      const bubble = document.createElement("div");
      bubble.className = "flex items-center gap-1 px-4 py-3";
      bubble.innerHTML = `
        <span class="loading-dot w-2 h-2 bg-gray-400 dark:bg-gray-500 rounded-full"></span>
        <span class="loading-dot w-2 h-2 bg-gray-400 dark:bg-gray-500 rounded-full"></span>
        <span class="loading-dot w-2 h-2 bg-gray-400 dark:bg-gray-500 rounded-full"></span>
      `;
      
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      
      chatThreadEl.scrollTop = chatThreadEl.scrollHeight;
    }

    function removeLoadingIndicator() {
      const loader = document.getElementById("loadingIndicator");
      if (loader) loader.remove();
    }

    function setButtonLoading(loading) {
      askBtn.disabled = loading;
      sendIcon.classList.toggle("hidden", loading);
      sendingSpinner.classList.toggle("hidden", !loading);
    }

    async function askQuestion(promptOverride = null) {
      const text = promptOverride || questionEl.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      setButtonLoading(true);

      // Add user message
      currentMessages.push({ role: "user", content: text });
      renderChat(currentMessages);
      questionEl.value = "";
      questionEl.style.height = "auto";

      // Show loading indicator
      addLoadingIndicator();

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: text,
            messages: currentMessages,
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.detail || "Request failed.");
        }

        const data = await response.json();
        const assistantText = data.answer || "No response generated.";

        removeLoadingIndicator();

        // Add assistant message with streaming effect
        const container = chatThreadEl.querySelector(".max-w-3xl");
        const msgEl = createMessageElement("assistant", "", true);
        container.appendChild(msgEl);
        
        const contentEl = msgEl.querySelector(".message-content");
        
        // Simulate streaming by revealing text gradually
        await streamText(contentEl, assistantText);

        currentMessages.push({ role: "assistant", content: assistantText });
        currentMessages = currentMessages.slice(-10);

      } catch (error) {
        removeLoadingIndicator();
        
        const container = chatThreadEl.querySelector(".max-w-3xl");
        const errorEl = document.createElement("div");
        errorEl.className = "flex gap-4 message-enter";
        errorEl.innerHTML = `
          <div class="w-8 h-8 bg-red-100 dark:bg-red-900/50 rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="text-red-600 dark:text-red-400 text-sm py-2">${escapeHtml(error.message)}</div>
        `;
        container.appendChild(errorEl);
      } finally {
        isStreaming = false;
        setButtonLoading(false);
        questionEl.focus();
        chatThreadEl.scrollTop = chatThreadEl.scrollHeight;
      }
    }

    async function streamText(element, text) {
      const words = text.split(/(\s+)/);
      let currentText = "";
      
      for (let i = 0; i < words.length; i++) {
        currentText += words[i];
        element.innerHTML = renderMarkdown(currentText) + '<span class="typing-cursor"></span>';
        chatThreadEl.scrollTop = chatThreadEl.scrollHeight;
        
        // Variable delay for natural feel
        const delay = words[i].trim() ? (Math.random() * 20 + 10) : 5;
        await new Promise(r => setTimeout(r, delay));
      }
      
      // Remove cursor
      element.innerHTML = renderMarkdown(currentText);
    }

    async function clearChat() {
      try {
        await fetch("/chat/clear", { method: "POST" });
      } catch (_) {}
      currentMessages = [];
      renderChat([]);
      questionEl.focus();
    }

    async function loadServerChatContext() {
      try {
        const res = await fetch("/chat/context");
        if (!res.ok) return;
        const payload = await res.json();
        const rows = Array.isArray(payload.recent_chats) ? payload.recent_chats : [];
        currentMessages = rows
          .filter(m => m && (m.role === "user" || m.role === "assistant") && typeof m.content === "string")
          .slice(-10);
        renderChat(currentMessages);
      } catch (_) {
        currentMessages = [];
        renderChat([]);
      }
    }

    // Event listeners
    askBtn.addEventListener("click", () => askQuestion());
    
    questionEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });

    clearChatBtn.addEventListener("click", clearChat);

    // Starter prompts
    starterPrompts.forEach(btn => {
      btn.addEventListener("click", () => {
        const prompt = btn.dataset.prompt || "Hi, help me find colleges";
        askQuestion(prompt);
      });
    });

    // Initialize
    loadServerChatContext();
  </script>
</body>
</html>
